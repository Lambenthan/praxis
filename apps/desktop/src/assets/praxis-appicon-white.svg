<!-- macOS app icon: the squircle body is 824x824 centered on a 1024 canvas
     (Apple's icon grid — the ~10% transparent margin is what makes it sit the
     same size as neighbouring dock icons). White ground, hairline edge, the
     Praxis mark (ink book, terracotta apex). -->
